name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release:
        description: Version bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  id-token: write
  contents: write

concurrency:
  group: marketplace-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Configure release commit author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        env:
          RELEASE_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.release || 'patch' }}
        run: |
          npm version "$RELEASE_TYPE" -m "chore: release %s [skip ci]"

      - name: Package extension
        run: npx --yes @vscode/vsce@3.9.2 package --no-dependencies --out /tmp/treehouse.vsix

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Publish to Visual Studio Marketplace
        run: |
          npx --yes @vscode/vsce@3.9.2 publish \
            --packagePath /tmp/treehouse.vsix \
            --azure-credential \
            --skip-duplicate

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          npx --yes ovsx@1.0.2 \
            --pat "$OVSX_PAT" \
            publish \
            --packagePath /tmp/treehouse.vsix \
            --skip-duplicate

      - name: Push release commit and tag
        run: git push origin HEAD:main --follow-tags
